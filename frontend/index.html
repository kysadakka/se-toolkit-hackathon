<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Shopping List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-color-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f0f0f5;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-tertiary: rgba(255, 255, 255, 0.35);
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --green: #00d68f;
            --green-glow: rgba(0, 214, 143, 0.2);
            --red: #ff6b6b;
            --red-glow: rgba(255, 107, 107, 0.15);
            --yellow: #ffc048;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.4);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse 600px 400px at 15% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 80% 60%, rgba(0, 214, 143, 0.05) 0%, transparent 70%),
                radial-gradient(ellipse 400px 300px at 50% 90%, rgba(255, 192, 72, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Auth */
        #auth {
            position: relative; max-width: 420px; margin: 6rem auto; padding: 2.5rem;
            background: var(--bg-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg); animation: fadeUp 0.6s ease;
        }
        #auth::before {
            content: ''; position: absolute; top: -1px; left: -1px; right: -1px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--green), transparent);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }
        #auth h2 {
            text-align: center; font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        #auth .subtitle { text-align: center; color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .auth-input {
            width: 100%; padding: 0.75rem 1rem; margin-bottom: 0.75rem;
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); color: var(--text-primary); font-family: inherit;
            font-size: 0.95rem; transition: var(--transition); outline: none;
        }
        .auth-input::placeholder { color: var(--text-tertiary); }
        .auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: rgba(255, 255, 255, 0.06); }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-md);
            font-family: inherit; font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: var(--transition); text-decoration: none; white-space: nowrap;
        }
        .btn-primary {
            width: 100%; background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff; box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
        .btn-ghost { width: 100%; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-ghost:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--border-color-hover); }
        .btn-accent-sm {
            padding: 0.5rem 1rem; font-size: 0.8rem;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff; box-shadow: 0 2px 8px var(--accent-glow);
        }
        .btn-accent-sm:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
        .btn-green-sm {
            padding: 0.5rem 1rem; font-size: 0.8rem;
            background: linear-gradient(135deg, #00d68f, #00b87a);
            color: #fff; box-shadow: 0 2px 8px var(--green-glow);
        }
        .btn-green-sm:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--green-glow); }
        .btn-red-sm {
            padding: 0.5rem 1rem; font-size: 0.8rem;
            background: rgba(255, 107, 107, 0.12); color: var(--red);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
        .btn-red-sm:hover { background: rgba(255, 107, 107, 0.2); }
        .btn-icon {
            width: 32px; height: 32px; padding: 0; border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color);
            color: var(--text-secondary); font-size: 0.85rem;
        }
        .btn-icon.danger:hover { background: var(--red-glow); color: var(--red); border-color: rgba(255, 107, 107, 0.3); }
        .error { color: var(--red); margin-top: 0.75rem; font-size: 0.85rem; text-align: center; }

        /* Header */
        .app-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 2rem; flex-wrap: wrap; gap: 0.75rem; animation: fadeUp 0.5s ease;
        }
        .app-header .brand {
            font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .family-select {
            padding: 0.5rem 0.75rem; background: var(--bg-glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            color: var(--text-primary); font-family: inherit; font-size: 0.85rem;
            cursor: pointer; outline: none; transition: var(--transition); -webkit-appearance: none;
        }
        .family-select option { background: var(--bg-secondary); color: var(--text-primary); }
        .tag {
            display: inline-flex; align-items: center; padding: 0.3rem 0.7rem;
            background: rgba(108, 92, 231, 0.12); border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 20px; color: var(--accent-light); font-size: 0.75rem; font-weight: 500;
        }

        /* Cards */
        .card {
            background: var(--bg-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color); border-radius: var(--radius-lg);
            padding: 1.25rem; margin-bottom: 1rem; transition: var(--transition);
            animation: fadeUp 0.5s ease both;
        }
        .card:hover { border-color: var(--border-color-hover); }
        .card-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tertiary); margin-bottom: 1rem; }
        .card-title {
            font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-primary);
            display: flex; align-items: center; justify-content: space-between;
        }

        /* Add item */
        .add-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        .input-field {
            padding: 0.6rem 0.8rem; background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            color: var(--text-primary); font-family: inherit; font-size: 0.9rem;
            outline: none; transition: var(--transition);
        }
        .input-field::placeholder { color: var(--text-tertiary); }
        .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .input-field.name-input { flex: 1; min-width: 140px; }
        .input-field.qty-input { max-width: 70px; text-align: center; }
        .select-field {
            padding: 0.6rem 0.8rem; background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            color: var(--text-primary); font-family: inherit; font-size: 0.85rem;
            outline: none; cursor: pointer; transition: var(--transition); -webkit-appearance: none;
        }
        .select-field option { background: var(--bg-secondary); }

        /* Suggestions */
        .suggestions-area { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
        .suggestions-label { font-size: 0.75rem; color: var(--text-secondary); margin-right: 0.25rem; }
        .suggestion-chip {
            display: inline-flex; align-items: center; padding: 0.35rem 0.75rem;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.15), rgba(0, 214, 143, 0.1));
            border: 1px solid rgba(108, 92, 231, 0.25); border-radius: 20px;
            color: var(--accent-light); font-size: 0.8rem; font-weight: 500;
            cursor: pointer; transition: var(--transition);
        }
        .suggestion-chip:hover { transform: translateY(-1px); box-shadow: 0 2px 8px var(--accent-glow); }

        /* Quick add */
        .quick-add { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
        .quick-label { font-size: 0.75rem; color: var(--text-tertiary); margin-right: 0.25rem; }
        .quick-chip {
            display: inline-flex; align-items: center; padding: 0.3rem 0.6rem;
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color);
            border-radius: 12px; color: var(--text-secondary); font-size: 0.75rem;
            cursor: pointer; transition: var(--transition);
        }
        .quick-chip:hover { background: var(--bg-card-hover); border-color: var(--border-color-hover); color: var(--text-primary); transform: translateY(-1px); }

        /* Tabs */
        .tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; animation: fadeUp 0.5s ease both; }
        .tab-pill {
            display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.4rem 0.85rem;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color);
            border-radius: 20px; color: var(--text-secondary); font-size: 0.8rem; font-weight: 500;
            cursor: pointer; transition: var(--transition);
        }
        .tab-pill:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .tab-pill.active { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; border-color: transparent; box-shadow: 0 2px 8px var(--accent-glow); }
        .tab-x { font-size: 0.65rem; opacity: 0.5; cursor: pointer; margin-left: 0.1rem; }
        .tab-x:hover { opacity: 1; color: var(--red); }
        .add-tab-btn {
            display: inline-flex; align-items: center; padding: 0.4rem 0.7rem;
            background: rgba(0, 214, 143, 0.1); border: 1px solid rgba(0, 214, 143, 0.2);
            border-radius: 20px; color: var(--green); font-size: 0.8rem; font-weight: 500;
            cursor: pointer; transition: var(--transition);
        }
        .add-tab-btn:hover { background: rgba(0, 214, 143, 0.18); transform: translateY(-1px); }

        /* Items */
        .item-row {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border-color); transition: var(--transition);
        }
        .item-row:last-child { border-bottom: none; }
        .item-row:hover { background: rgba(255, 255, 255, 0.02); border-radius: var(--radius-sm); }
        .item-name { font-weight: 500; flex: 1; font-size: 0.95rem; }
        .item-qty {
            font-size: 0.8rem; color: var(--text-secondary); background: rgba(255, 255, 255, 0.04);
            padding: 0.15rem 0.5rem; border-radius: 6px; font-weight: 500;
        }
        .item-category-badge {
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 0.15rem 0.45rem; border-radius: 5px; background: rgba(255, 192, 72, 0.1);
            border: 1px solid rgba(255, 192, 72, 0.15); color: var(--yellow);
        }
        .purchased .item-name { text-decoration: line-through; opacity: 0.4; }
        .purchased .item-qty, .purchased .item-category-badge { opacity: 0.4; }
        .item-actions { display: flex; gap: 0.25rem; }

        /* History */
        .history-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-bottom: 1px solid var(--border-color); }
        .history-row:last-child { border-bottom: none; }
        .history-row .item-name { opacity: 0.5; text-decoration: line-through; font-size: 0.9rem; }
        .history-row .item-qty { opacity: 0.5; }
        .btn-readd {
            padding: 0.3rem 0.6rem; background: rgba(0, 214, 143, 0.1);
            border: 1px solid rgba(0, 214, 143, 0.2); border-radius: 6px;
            color: var(--green); font-size: 0.7rem; font-weight: 600;
            cursor: pointer; transition: var(--transition);
        }
        .btn-readd:hover { background: rgba(0, 214, 143, 0.2); transform: translateY(-1px); }

        /* Family panel */
        .family-info { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .family-info-text { font-size: 0.9rem; color: var(--text-secondary); }
        .family-info-text strong { color: var(--text-primary); font-weight: 600; }
        .family-form {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 1rem; margin-bottom: 0.75rem;
        }
        .family-form-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); margin-bottom: 0.5rem; }
        .family-form-row { display: flex; gap: 0.4rem; margin-bottom: 0.5rem; }
        .family-form-row:last-child { margin-bottom: 0; }
        .family-form-row .input-field { flex: 1; font-size: 0.85rem; padding: 0.5rem 0.6rem; }
        .family-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

        /* Logout */
        .logout-btn {
            width: 100%; padding: 0.75rem; margin-top: 0.5rem; background: transparent;
            border: 1px solid var(--border-color); border-radius: var(--radius-md);
            color: var(--text-tertiary); font-family: inherit; font-size: 0.85rem;
            font-weight: 500; cursor: pointer; transition: var(--transition);
        }
        .logout-btn:hover { background: rgba(255, 255, 255, 0.03); color: var(--text-secondary); border-color: var(--border-color-hover); }

        /* Misc */
        .loading { text-align: center; padding: 1.5rem; color: var(--text-tertiary); font-size: 0.85rem; }
        .loading::before {
            content: ''; display: block; width: 24px; height: 24px; margin: 0 auto 0.75rem;
            border: 2px solid var(--border-color); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .empty-state { text-align: center; padding: 2rem 1rem; color: var(--text-tertiary); font-size: 0.9rem; }
        .empty-state .icon { font-size: 2rem; margin-bottom: 0.5rem; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 520px) {
            .container { padding: 1rem; }
            .app-header { flex-direction: column; align-items: flex-start; }
            .add-row { flex-direction: column; }
            .add-row .input-field, .add-row .select-field, .add-row .btn { width: 100%; }
            .card { padding: 1rem; }
            #auth { margin: 2rem 1rem; padding: 1.75rem; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="auth">
        <h2>Shopping List</h2>
        <p class="subtitle">Share lists with your family, powered by AI</p>
        <input class="auth-input" type="email" id="email" placeholder="Email">
        <input class="auth-input" type="password" id="password" placeholder="Password">
        <button class="btn btn-primary" onclick="register()">Create Account</button>
        <button class="btn btn-ghost" onclick="login()" style="margin-top:0.5rem;">Sign In</button>
        <div id="authError" class="error"></div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <div class="container">
            <!-- Header -->
            <div class="app-header">
                <div class="brand">Shopping List</div>
                <div class="header-controls">
                    <select class="family-select" id="familySelect" onchange="switchFamily(this.value)"></select>
                    <button class="btn btn-icon" onclick="toggleFamilyPanel()" title="Manage families">👥</button>
                </div>
            </div>

            <!-- Family Panel -->
            <div id="familyPanel" class="card hidden">
                <div class="card-label">Family Management</div>
                <div class="family-info" id="familyInfo"></div>
                <div class="family-form">
                    <div class="family-form-title">Join a family</div>
                    <div class="family-form-row">
                        <input class="input-field" type="text" id="joinFamilyName" placeholder="Enter family name">
                        <button class="btn btn-green-sm" onclick="joinFamily()">Join</button>
                    </div>
                    <div class="family-form-row">
                        <input class="input-field" type="password" id="joinFamilyPassword" placeholder="Family password">
                    </div>
                </div>
                <div class="family-form" style="margin-bottom:0;">
                    <div class="family-form-title">Create a family</div>
                    <div class="family-form-row">
                        <input class="input-field" type="text" id="createFamilyName" placeholder="New family name">
                        <button class="btn btn-accent-sm" onclick="createFamily()">Create</button>
                    </div>
                    <div class="family-form-row">
                        <input class="input-field" type="password" id="createFamilyPassword" placeholder="Set family password">
                    </div>
                </div>
                <div class="family-actions" id="familyActions" style="margin-top:0.75rem;"></div>
            </div>

            <!-- List Tabs -->
            <div class="tabs" id="tabsContainer"></div>

            <!-- Add Item -->
            <div class="card">
                <div class="card-label">Add to list</div>
                <div class="add-row">
                    <input class="input-field name-input" type="text" id="itemName" placeholder="What do you need?">
                    <input class="input-field qty-input" type="text" id="itemQty" value="1">
                    <select class="select-field" id="itemCategory">
                        <option value="Dairy">🥛 Dairy</option>
                        <option value="Bakery">🍞 Bakery</option>
                        <option value="Produce">🥬 Produce</option>
                        <option value="Meat">🥩 Meat</option>
                        <option value="Frozen">🧊 Frozen</option>
                        <option value="Beverages">🥤 Beverages</option>
                        <option value="Snacks">🍪 Snacks</option>
                        <option value="Cleaning">🧹 Cleaning</option>
                        <option value="Other" selected>📦 Other</option>
                    </select>
                    <button class="btn btn-accent-sm" onclick="addItem()" id="addBtn">Add</button>
                </div>
                <div id="suggestions" class="suggestions-area"></div>
                <div class="quick-add">
                    <span class="quick-label">Quick add:</span>
                    <span class="quick-chip" onclick="quickAdd('milk')">🥛 Milk</span>
                    <span class="quick-chip" onclick="quickAdd('bread')">🍞 Bread</span>
                    <span class="quick-chip" onclick="quickAdd('eggs')">🥚 Eggs</span>
                    <span class="quick-chip" onclick="quickAdd('bananas')">🍌 Bananas</span>
                    <span class="quick-chip" onclick="quickAdd('chicken')">🍗 Chicken</span>
                    <span class="quick-chip" onclick="quickAdd('rice')">🍚 Rice</span>
                    <span class="quick-chip" onclick="quickAdd('tomatoes')">🍅 Tomatoes</span>
                    <span class="quick-chip" onclick="quickAdd('cheese')">🧀 Cheese</span>
                </div>
            </div>

            <!-- Items List -->
            <div class="card">
                <div class="card-title">
                    <span>📋 Your Items</span>
                    <span class="tag" id="itemCount">0 items</span>
                </div>
                <div id="itemsList"></div>
            </div>

            <!-- Purchase History -->
            <div class="card">
                <div class="card-title">
                    <span>📜 History</span>
                    <button class="btn-icon" onclick="loadHistory()" title="Refresh">↻</button>
                </div>
                <div id="historyList"></div>
            </div>

            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <script>
        let token = null;
        let currentUser = null;
        let currentListId = null;
        let lists = [];

        async function request(method, url, body = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined });
            if (!res.ok) {
                const text = await res.text();
                try { const j = JSON.parse(text); throw new Error(j.detail || text); } catch(_) { throw new Error(text); }
            }
            return res.json();
        }

        // Auth
        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { document.getElementById('authError').innerText = 'Email and password required'; return; }
            try {
                await request('POST', '/api/auth/register', { email, password });
                document.getElementById('authError').innerText = 'Account created! Now sign in.';
            } catch (err) { document.getElementById('authError').innerText = err.message; }
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const data = await request('POST', '/api/auth/login', { email, password });
                token = data.access_token;
                currentUser = data.user;
                localStorage.setItem('token', token);
                showApp();
                await loadAll();
                document.getElementById('authError').innerText = '';
            } catch (err) { document.getElementById('authError').innerText = 'Login failed: ' + err.message; }
        }

        function showApp() { document.getElementById('auth').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); }

        function logout() {
            token = null; currentUser = null; currentListId = null; lists = [];
            localStorage.removeItem('token');
            document.getElementById('auth').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }

        async function loadAll() {
            await loadUserInfo();
            renderFamilySelector();
            if (currentUser && currentUser.active_family_id) {
                await loadLists();
                loadItems();
                loadHistory();
            }
        }

        async function loadUserInfo() { currentUser = await request('GET', '/api/auth/me'); }

        // Family
        function renderFamilySelector() {
            const select = document.getElementById('familySelect');
            if (!currentUser.families || currentUser.families.length === 0) { select.innerHTML = '<option>No families</option>'; return; }
            select.innerHTML = currentUser.families.map(f =>
                `<option value="${f.id}" ${f.id === currentUser.active_family_id ? 'selected' : ''}>${escapeHtml(f.name)}</option>`
            ).join('');
        }

        async function switchFamily(familyId) {
            familyId = parseInt(familyId);
            if (!familyId) return;
            await request('POST', `/api/families/${familyId}/set-active`);
            currentUser.active_family_id = familyId;
            currentListId = null; lists = [];
            renderFamilySelector();
            await loadLists(); loadItems(); loadHistory();
            document.getElementById('familyPanel').classList.add('hidden');
        }

        function toggleFamilyPanel() {
            const panel = document.getElementById('familyPanel');
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden')) renderFamilyPanel();
        }

        function renderFamilyPanel() {
            const infoDiv = document.getElementById('familyInfo');
            const actionsDiv = document.getElementById('familyActions');
            const activeFamily = currentUser.families.find(f => f.id === currentUser.active_family_id);
            if (!activeFamily) { infoDiv.innerHTML = '<p class="loading">No active family</p>'; actionsDiv.innerHTML = ''; return; }
            infoDiv.innerHTML = `<div class="family-info-text"><strong>${escapeHtml(activeFamily.name)}</strong> — ${activeFamily.member_count} member(s)${activeFamily.is_owner ? ' · Owner' : ''}</div>`;
            actionsDiv.innerHTML = activeFamily.is_owner
                ? `<button class="btn btn-red-sm" onclick="deleteFamily(${activeFamily.id})">Delete Family</button>`
                : `<button class="btn btn-red-sm" onclick="leaveFamily(${activeFamily.id})">Leave Family</button>`;
        }

        async function createFamily() {
            const name = document.getElementById('createFamilyName').value.trim();
            const password = document.getElementById('createFamilyPassword').value;
            if (!name || !password) return alert('Name and password required');
            await request('POST', '/api/families', { name, password });
            await loadUserInfo(); renderFamilySelector();
            currentListId = null; lists = []; await loadLists(); loadItems(); loadHistory();
            document.getElementById('createFamilyName').value = '';
            document.getElementById('createFamilyPassword').value = '';
            document.getElementById('familyPanel').classList.add('hidden');
        }

        async function joinFamily() {
            const name = document.getElementById('joinFamilyName').value.trim();
            const password = document.getElementById('joinFamilyPassword').value;
            if (!name || !password) return alert('Name and password required');
            await request('POST', '/api/families/join', { family_name: name, password });
            await loadUserInfo(); renderFamilySelector();
            currentListId = null; lists = []; await loadLists(); loadItems(); loadHistory();
            document.getElementById('joinFamilyName').value = '';
            document.getElementById('joinFamilyPassword').value = '';
            document.getElementById('familyPanel').classList.add('hidden');
        }

        async function leaveFamily(familyId) {
            if (!confirm('Leave this family?')) return;
            await request('DELETE', `/api/families/${familyId}/leave`);
            await loadUserInfo(); renderFamilySelector();
            currentListId = null; lists = [];
            if (currentUser.active_family_id) { await loadLists(); loadItems(); loadHistory(); }
            else {
                document.getElementById('itemsList').innerHTML = '<div class="empty-state"><div class="icon">👥</div>Join or create a family.</div>';
                document.getElementById('historyList').innerHTML = '';
                document.getElementById('tabsContainer').innerHTML = '';
                document.getElementById('itemCount').textContent = '0 items';
            }
            renderFamilyPanel();
        }

        async function deleteFamily(familyId) {
            if (!confirm('Delete this family and ALL its data?')) return;
            await request('DELETE', `/api/families/${familyId}`);
            await loadUserInfo(); renderFamilySelector();
            currentListId = null; lists = [];
            if (currentUser.active_family_id) { await loadLists(); loadItems(); loadHistory(); }
            else {
                document.getElementById('itemsList').innerHTML = '<div class="empty-state"><div class="icon">✨</div>Create a new family.</div>';
                document.getElementById('historyList').innerHTML = '';
                document.getElementById('tabsContainer').innerHTML = '';
                document.getElementById('itemCount').textContent = '0 items';
            }
            renderFamilyPanel();
        }

        // Lists
        async function loadLists() {
            if (!currentUser.active_family_id) return;
            lists = await request('GET', '/api/lists');
            renderTabs();
            if (lists.length > 0 && !currentListId) { currentListId = lists[0].id; renderTabs(); }
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            let html = lists.map(l =>
                `<span class="tab-pill ${l.id === currentListId ? 'active' : ''}" onclick="selectList(${l.id})">${escapeHtml(l.name)}${lists.length > 1 ? `<span class="tab-x" onclick="event.stopPropagation();deleteList(${l.id})">✕</span>` : ''}</span>`
            ).join('');
            html += `<span class="add-tab-btn" onclick="createList()">+ New</span>`;
            container.innerHTML = html;
        }

        function selectList(id) { currentListId = id; renderTabs(); loadItems(); }

        async function createList() {
            const name = prompt('List name:');
            if (!name || !name.trim()) return;
            const newList = await request('POST', '/api/lists', { name: name.trim() });
            lists.push(newList); currentListId = newList.id; renderTabs(); loadItems();
        }

        async function deleteList(id) {
            if (!confirm('Delete this list?')) return;
            await request('DELETE', `/api/lists/${id}`);
            lists = lists.filter(l => l.id !== id);
            if (currentListId === id) currentListId = lists.length > 0 ? lists[0].id : null;
            renderTabs(); loadItems();
        }

        // Items
        async function loadItems() {
            const container = document.getElementById('itemsList');
            container.innerHTML = '<div class="loading">Loading items...</div>';
            if (!currentUser.active_family_id) { container.innerHTML = '<div class="empty-state"><div class="icon">👥</div>No active family.</div>'; return; }
            const url = currentListId ? `/api/items?list_id=${currentListId}` : '/api/items';
            const items = await request('GET', url);
            renderItems(items);
        }

        function renderItems(items) {
            const container = document.getElementById('itemsList');
            document.getElementById('itemCount').textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');
            if (items.length === 0) { container.innerHTML = '<div class="empty-state"><div class="icon">🛒</div>No items yet. Add something above!</div>'; return; }
            container.innerHTML = items.map(item => `
                <div class="item-row ${item.purchased ? 'purchased' : ''}">
                    <span class="item-name">${escapeHtml(item.name)}</span>
                    <span class="item-qty">${escapeHtml(item.quantity)}</span>
                    <span class="item-category-badge">${escapeHtml(item.category || 'Other')}</span>
                    <div class="item-actions">
                        <button class="btn btn-icon" onclick="togglePurchased(${item.id})" title="${item.purchased ? 'Undo' : 'Done'}">${item.purchased ? '↩' : '✓'}</button>
                        <button class="btn btn-icon danger" onclick="deleteItem(${item.id})" title="Delete">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const quantity = document.getElementById('itemQty').value.trim() || '1';
            const category = document.getElementById('itemCategory').value;
            if (!name) return alert('Item name required');
            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true; addBtn.textContent = '...';
            try {
                const body = { name, quantity, category };
                if (currentListId) body.list_id = currentListId;
                const response = await request('POST', '/api/items', body);
                renderSuggestions(response.suggestions || []);
                document.getElementById('itemName').value = '';
                document.getElementById('itemQty').value = '1';
                loadItems();
            } finally { addBtn.disabled = false; addBtn.textContent = 'Add'; }
        }

        async function quickAdd(name) {
            const body = { name, quantity: '1', category: 'Other' };
            if (currentListId) body.list_id = currentListId;
            const response = await request('POST', '/api/items', body);
            renderSuggestions(response.suggestions || []);
            loadItems();
        }

        async function addSuggestedItem(itemName) {
            const body = { name: itemName, quantity: '1', category: 'Other' };
            if (currentListId) body.list_id = currentListId;
            await request('POST', '/api/items', body);
            document.getElementById('suggestions').innerHTML = '';
            loadItems();
        }

        function renderSuggestions(suggestions) {
            const container = document.getElementById('suggestions');
            if (!suggestions || suggestions.length === 0) { container.innerHTML = ''; return; }
            container.innerHTML = `<span class="suggestions-label">✨ AI:</span> ${suggestions.map(s => `<span class="suggestion-chip" onclick="addSuggestedItem('${escapeHtml(s)}')">${escapeHtml(s)}</span>`).join('')}`;
        }

        async function togglePurchased(id) { await request('PATCH', `/api/items/${id}`); loadItems(); }
        async function deleteItem(id) { if (!confirm('Delete item?')) return; await request('DELETE', `/api/items/${id}`); loadItems(); }

        // History
        async function loadHistory() {
            const container = document.getElementById('historyList');
            if (!currentUser.active_family_id) { container.innerHTML = ''; return; }
            container.innerHTML = '<div class="loading">Loading history...</div>';
            const items = await request('GET', '/api/history');
            if (items.length === 0) { container.innerHTML = '<div class="empty-state" style="padding:1rem;"><span style="color:var(--text-tertiary);font-size:0.85rem;">No purchase history yet</span></div>'; return; }
            container.innerHTML = items.map(item => `
                <div class="history-row">
                    <span class="item-name">${escapeHtml(item.name)}</span>
                    <span class="item-qty">${escapeHtml(item.quantity)}</span>
                    <button class="btn-readd" onclick="readdFromHistory('${escapeHtml(item.name)}','${escapeHtml(item.quantity)}','${escapeHtml(item.category)}')">Add</button>
                </div>
            `).join('');
        }

        async function readdFromHistory(name, quantity, category) {
            const body = { name, quantity, category };
            if (currentListId) body.list_id = currentListId;
            await request('POST', '/api/items', body); loadItems();
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; });
        }

        // Init
        const savedToken = localStorage.getItem('token');
        if (savedToken) { token = savedToken; showApp(); loadAll().catch(() => logout()); }
    </script>
</body>
</html>
